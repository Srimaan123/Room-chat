<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Chat</title>
    <style>
        body {
            margin: 0;
            font-family: "Segoe UI", sans-serif;
            background: linear-gradient(135deg, #141e30, #243b55);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        
        /* Container */
        .maindiv {
            width: 95%;
            max-width: 420px;
            height: 92vh;
            display: flex;
            flex-direction: column;
            background: rgba(255,255,255,0.08);
            backdrop-filter: blur(18px);
            border-radius: 25px;
            overflow: hidden;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }
        
        /* Messages area */
        .messages {
            flex: 1;
            overflow-y: auto;
            padding: 12px;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        
        /* Scrollbar */
        .messages::-webkit-scrollbar {
            width: 5px;
        }
        .messages::-webkit-scrollbar-thumb {
            background: rgba(255,255,255,0.2);
            border-radius: 10px;
        }
        
        /* Sender message */
        .senderMessage {
            align-self: flex-end;
            background: linear-gradient(135deg, #00e6a8, #00c9ff);
            color: #003b2f;
            padding: 10px 14px;
            border-radius: 16px 16px 4px 16px;
            margin: 4px 0;
            max-width: 75%;
            font-size: 14px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            animation: pop 0.2s ease;
        }
        
        /* Receiver message */
        .receiverMessage {
            align-self: flex-start;
            background: rgba(255,255,255,0.18);
            color: white;
            padding: 10px 14px;
            border-radius: 16px 16px 16px 4px;
            margin: 4px 0;
            max-width: 75%;
            font-size: 14px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            animation: pop 0.2s ease;
        }
        
        /* Message text */
        .text {
            margin: 0;
            word-wrap: break-word;
        }
        
        /* Input area */
        .sender {
            width: calc(100% - 80px);
            margin: 10px;
            padding: 12px;
            border-radius: 20px;
            border: none;
            outline: none;
            background: rgba(0,0,0,0.5);
            color: white;
            font-size: 14px;
        }
        
        /* Button */
        button {
            margin-right: 10px;
            padding: 10px 16px;
            border-radius: 18px;
            border: none;
            background: linear-gradient(135deg, #00e6a8, #00c9ff);
            cursor: pointer;
            font-weight: bold;
            transition: 0.2s;
        }
        
        button:hover {
            transform: scale(1.08);
        }
        
        /* Animation */
        @keyframes pop {
            from {
                transform: scale(0.8);
                opacity: 0;
            }
            to {
                transform: scale(1);
                opacity: 1;
            }
        }
    </style>
</head>
<body>
    <div class="maindiv">
        <div class="messages">
            {% for chat in chats%}
            {% if chat and chat[0] == user_id %}
            <div class="senderMessage">
                <p class="text">{{chat[3]}}</p>
            </div>
            {% else %}
            <div class="receiverMessage">
                <p class="text">{{chat[3]}}</p>
            </div>
            {% endif %}
            {% endfor %}
        </div>
        <input type="text" class="sender" id="sender">
        <button type="button" onclick="sendMessage()">➡</button>
    </div>
    <script src="https://cdn.socket.io/4.0.0/socket.io.min.js"></script>
    <script>
        const socket = io();
        
        socket.emit("join_room",{
            room: "{{room}}"
        });
        function sendMessage(){
            let sender = document.querySelector(".sender");
            
            msg = sender.value
            
            if (msg === "") return;
            
            socket.emit("send_message",{
                user_id: {{user_id}}, 
                room: "{{room}}", 
                message: msg
            });
            
            sender.value = "";
        };
        socket.on("receive_message",(data)=>{
            let box = document.querySelector(".messages");
            let text = document.createElement("p");
            
            text.className = "text";
            text.innerText = data.name+":"+data.message;
            
            let div = document.createElement("div");
            
            if(data.user_id == {{user_id}}){
                div.className = "senderMessage";
            }else{
                div.className = "receiverMessage"
            }
            
            div.appendChild(text);
            box.appendChild(div);
            
            box.scrollTop = box.scrollHeight;
        })
    </script>
</body>
</html>
